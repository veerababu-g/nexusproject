<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" rx="72" fill="#0F1526"/>

  <!-- connecting lines forming the "nexus" -->
  <g stroke="#3A4470" stroke-width="4">
    <line x1="200" y1="130" x2="130" y2="250"/>
    <line x1="200" y1="130" x2="270" y2="250"/>
    <line x1="130" y1="250" x2="270" y2="250"/>
  </g>

  <!-- top node -->
  <circle cx="200" cy="130" r="26" fill="#0F1526" stroke="#4CC9C0" stroke-width="7"/>
  <!-- bottom-left node -->
  <circle cx="130" cy="250" r="22" fill="#0F1526" stroke="#4CC9C0" stroke-width="7"/>
  <!-- bottom-right node (accent) -->
  <circle cx="270" cy="250" r="22" fill="#0F1526" stroke="#E8B34C" stroke-width="7"/>

  <!-- center hub -->
  <circle cx="200" cy="212" r="9" fill="#EDEFF5"/>
</svg>
